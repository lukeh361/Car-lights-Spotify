<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Car Lights</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #color-bg {
    position: fixed;
    inset: 0;
    opacity: 0;
    transition: background-color 1.2s ease, opacity 1.2s ease;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 390px;
    padding: 40px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    transition: all 0.4s ease;
  }
  .status-pill.active {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.9);
  }

  .album-wrap {
    position: relative;
    width: 240px;
    height: 240px;
  }

  .album-glow {
    position: absolute;
    inset: -20px;
    border-radius: 20px;
    opacity: 0;
    filter: blur(40px);
    transition: background-color 1.2s ease, opacity 1.2s ease;
    z-index: 0;
  }

  #album-art {
    width: 240px;
    height: 240px;
    border-radius: 12px;
    object-fit: cover;
    display: block;
    position: relative;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.6s ease;
    background: #1a1a1a;
  }
  #album-art.loaded { opacity: 1; }

  .track-info {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #track-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #artist-name {
    font-size: 14px;
    font-weight: 400;
    opacity: 0;
    color: rgba(255,255,255,0.55);
    transition: opacity 0.6s ease;
  }

  .color-swatch {
    width: 100%;
    height: 72px;
    border-radius: 16px;
    background: #1a1a1a;
    transition: background-color 1.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  #color-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
    text-transform: uppercase;
    mix-blend-mode: difference;
    color: white;
    opacity: 0.7;
    transition: opacity 0.4s;
  }

  #connect-btn {
    background: #1DB954;
    color: #000;
    border: none;
    border-radius: 100px;
    padding: 16px 40px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  #connect-btn:active { transform: scale(0.96); opacity: 0.85; }

  #error-msg {
    font-size: 13px;
    color: rgba(255,100,100,0.8);
    text-align: center;
    display: none;
  }

  .now-playing-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    display: none;
  }
</style>
</head>
<body>

<div id="color-bg"></div>

<div class="container">
  <div class="status-pill" id="status-pill">Not connected</div>

  <div class="album-wrap">
    <div class="album-glow" id="album-glow"></div>
    <img id="album-art" src="" alt="" crossorigin="anonymous" />
  </div>

  <div class="now-playing-label" id="now-playing-label">Now Playing</div>

  <div class="track-info">
    <div id="track-name"></div>
    <div id="artist-name"></div>
  </div>

  <div class="color-swatch" id="color-swatch">
    <span id="color-label">—</span>
  </div>

  <button id="connect-btn" onclick="startAuth()">Connect Spotify</button>
  <div id="error-msg"></div>
</div>

<canvas id="canvas" style="display:none" width="100" height="100"></canvas>

<script>
  const CLIENT_ID = '51ca4c2686b1412d9315f46a4927e640';
  const REDIRECT_URI = window.location.origin + window.location.pathname;
  const SCOPES = 'user-read-currently-playing user-read-playback-state';

  let accessToken = null;
  let pollInterval = null;
  let lastTrackId = null;

  // --- Auth ---
  function startAuth() {
    const verifier = generateCodeVerifier();
    sessionStorage.setItem('cv', verifier);
    generateCodeChallenge(verifier).then(challenge => {
      const params = new URLSearchParams({
        client_id: CLIENT_ID,
        response_type: 'code',
        redirect_uri: REDIRECT_URI,
        scope: SCOPES,
        code_challenge_method: 'S256',
        code_challenge: challenge,
      });
      window.location = 'https://accounts.spotify.com/authorize?' + params;
    });
  }

  function generateCodeVerifier() {
    const arr = new Uint8Array(32);
    crypto.getRandomValues(arr);
    return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  }

  async function generateCodeChallenge(verifier) {
    const data = new TextEncoder().encode(verifier);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  }

  async function exchangeCode(code) {
    const verifier = sessionStorage.getItem('cv');
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        code,
        redirect_uri: REDIRECT_URI,
        client_id: CLIENT_ID,
        code_verifier: verifier,
      })
    });
    const data = await res.json();
    if (data.access_token) {
      accessToken = data.access_token;
      localStorage.setItem('sp_token', accessToken);
      localStorage.setItem('sp_token_exp', Date.now() + (data.expires_in * 1000));
      if (data.refresh_token) localStorage.setItem('sp_refresh', data.refresh_token);
      window.history.replaceState({}, '', window.location.pathname);
      startPolling();
    } else {
      showError('Auth failed. Please try again.');
    }
  }

  async function refreshToken() {
    const refresh = localStorage.getItem('sp_refresh');
    if (!refresh) return false;
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'refresh_token',
        refresh_token: refresh,
        client_id: CLIENT_ID,
      })
    });
    const data = await res.json();
    if (data.access_token) {
      accessToken = data.access_token;
      localStorage.setItem('sp_token', accessToken);
      localStorage.setItem('sp_token_exp', Date.now() + (data.expires_in * 1000));
      return true;
    }
    return false;
  }

  // --- Polling ---
  function startPolling() {
    document.getElementById('connect-btn').style.display = 'none';
    setStatus('Listening...', true);
    fetchNowPlaying();
    pollInterval = setInterval(fetchNowPlaying, 3000);
  }

  async function fetchNowPlaying() {
    // refresh if within 60s of expiry
    const exp = parseInt(localStorage.getItem('sp_token_exp') || '0');
    if (Date.now() > exp - 60000) {
      const ok = await refreshToken();
      if (!ok) { resetUI(); return; }
    }

    try {
      const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
        headers: { Authorization: 'Bearer ' + accessToken }
      });

      if (res.status === 204 || res.status === 404) {
        setStatus('Nothing playing', false);
        clearTrack();
        return;
      }
      if (res.status === 401) {
        const ok = await refreshToken();
        if (!ok) { resetUI(); return; }
        fetchNowPlaying();
        return;
      }

      const data = await res.json();
      if (!data.item) { clearTrack(); return; }

      const track = data.item;
      const trackId = track.id;

      if (trackId === lastTrackId) return;
      lastTrackId = trackId;

      const trackName = track.name;
      const artistName = track.artists.map(a => a.name).join(', ');
      const albumArt = track.album.images[0]?.url;

      updateUI(trackName, artistName, albumArt);

    } catch(e) {
      console.error(e);
    }
  }

  function updateUI(trackName, artistName, artUrl) {
    const img = document.getElementById('album-art');
    img.classList.remove('loaded');

    setTimeout(() => {
      img.onload = () => {
        img.classList.add('loaded');
        extractColor(img);
      };
      img.src = artUrl;

      document.getElementById('track-name').textContent = trackName;
      document.getElementById('artist-name').textContent = artistName;
      document.getElementById('track-name').style.opacity = '1';
      document.getElementById('artist-name').style.opacity = '1';
      document.getElementById('now-playing-label').style.display = 'block';
      setStatus('Synced', true);
    }, 300);
  }

  function clearTrack() {
    lastTrackId = null;
    document.getElementById('track-name').style.opacity = '0';
    document.getElementById('artist-name').style.opacity = '0';
    document.getElementById('album-art').classList.remove('loaded');
    document.getElementById('now-playing-label').style.display = 'none';
    document.getElementById('color-bg').style.opacity = '0';
    document.getElementById('album-glow').style.opacity = '0';
    document.getElementById('color-swatch').style.background = '#1a1a1a';
    document.getElementById('color-label').textContent = '—';
  }

  // --- Color Extraction ---
  function extractColor(img) {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, 100, 100);
    const data = ctx.getImageData(0, 0, 100, 100).data;

    // Collect all pixels, filter out near-white and near-black
    let pixels = [];
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i+1], b = data[i+2];
      const brightness = (r + g + b) / 3;
      const saturation = Math.max(r,g,b) - Math.min(r,g,b);
      if (brightness > 20 && brightness < 230 && saturation > 30) {
        pixels.push([r, g, b]);
      }
    }

    if (pixels.length === 0) {
      // fallback: just average everything
      let tr=0,tg=0,tb=0;
      for(let i=0;i<data.length;i+=4){tr+=data[i];tg+=data[i+1];tb+=data[i+2];}
      const n = data.length/4;
      applyColor(Math.round(tr/n), Math.round(tg/n), Math.round(tb/n));
      return;
    }

    // Simple k-means with k=3, pick most vibrant cluster
    let centroids = [pixels[0], pixels[Math.floor(pixels.length/2)], pixels[pixels.length-1]];
    for (let iter = 0; iter < 8; iter++) {
      let clusters = [[], [], []];
      for (const p of pixels) {
        let minD = Infinity, ci = 0;
        centroids.forEach((c, i) => {
          const d = Math.hypot(p[0]-c[0], p[1]-c[1], p[2]-c[2]);
          if (d < minD) { minD = d; ci = i; }
        });
        clusters[ci].push(p);
      }
      centroids = clusters.map(cluster => {
        if (!cluster.length) return [128,128,128];
        const avg = cluster.reduce((a,b) => [a[0]+b[0],a[1]+b[1],a[2]+b[2]], [0,0,0]);
        return avg.map(v => Math.round(v / cluster.length));
      });
    }

    // Pick most saturated centroid
    let best = centroids[0];
    let bestSat = 0;
    for (const c of centroids) {
      const sat = Math.max(...c) - Math.min(...c);
      if (sat > bestSat) { bestSat = sat; best = c; }
    }

    applyColor(best[0], best[1], best[2]);
  }

  function applyColor(r, g, b) {
    const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');

    document.getElementById('color-bg').style.backgroundColor = hex;
    document.getElementById('color-bg').style.opacity = '0.18';
    document.getElementById('album-glow').style.backgroundColor = hex;
    document.getElementById('album-glow').style.opacity = '0.6';
    document.getElementById('color-swatch').style.backgroundColor = hex;
    document.getElementById('color-label').textContent = hex.toUpperCase();
  }

  // --- UI helpers ---
  function setStatus(text, active) {
    const pill = document.getElementById('status-pill');
    pill.textContent = text;
    pill.className = 'status-pill' + (active ? ' active' : '');
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function resetUI() {
    clearInterval(pollInterval);
    accessToken = null;
    localStorage.removeItem('sp_token');
    localStorage.removeItem('sp_token_exp');
    localStorage.removeItem('sp_refresh');
    document.getElementById('connect-btn').style.display = 'block';
    setStatus('Not connected', false);
    clearTrack();
  }

  // --- Init ---
  (async function init() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');

    if (code) {
      await exchangeCode(code);
      return;
    }

    const token = localStorage.getItem('sp_token');
    const exp = parseInt(localStorage.getItem('sp_token_exp') || '0');

    if (token && Date.now() < exp - 60000) {
      accessToken = token;
      startPolling();
    } else if (localStorage.getItem('sp_refresh')) {
      const ok = await refreshToken();
      if (ok) startPolling();
    }
  })();
</script>
</body>
</html>
